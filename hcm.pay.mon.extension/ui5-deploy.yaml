# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: customer-hcm-pay-mon-extension
type: application
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
customConfiguration:
  adp:
    support:
      id: '@sap/generator-fiori'
      version: 1.24.0
      toolsId: c918fd57-e371-4f43-aab8-55937d9946b2
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: S4_BED
          url: http://vhcyubedci.sap.barrie.ca:44300
          client: '200'
        app:
          package: ZHR
          transport: BEDK920285
        exclude:
          - /test/
        lrep: apps/hcm.fab.mypaystubs/appVariants/customer.hcm.pay.mon.extension/
